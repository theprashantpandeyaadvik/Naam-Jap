<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>जय काली माई — नाम जप</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700&family=Noto+Sans+Devanagari:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0508;
    --saffron: #FF6B00;
    --gold:    #D4A017;
    --crimson: #8B0000;
    --cream:   #FFF3E0;
    --muted:   #7a5c5c;
    --glow:    rgba(255,107,0,0.35);
    --panel:   rgba(255,255,255,0.03);
  }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Noto Serif Devanagari', serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
    padding: 1.5rem 1rem 2rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(139,0,0,0.4) 0%, transparent 70%),
      radial-gradient(ellipse 30% 50% at 20% 80%, rgba(255,107,0,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 30% 50% at 80% 80%, rgba(255,107,0,0.1) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .sparks { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .spark {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: floatUp var(--dur, 6s) var(--delay, 0s) infinite ease-in;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    10%  { opacity: 0.8; }
    80%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-80vh) scale(0.3) translateX(var(--drift,20px)); }
  }

  .wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 440px;
  }

  .om {
    font-size: 2.4rem;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 0.2rem;
    text-shadow: 0 0 20px var(--gold);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:0.6; text-shadow:0 0 12px var(--gold); }
    50%      { opacity:1;   text-shadow:0 0 30px var(--gold), 0 0 60px var(--saffron); }
  }

  .mantra-title {
    font-size: clamp(1.9rem, 7vw, 2.8rem);
    font-weight: 700;
    color: var(--saffron);
    text-align: center;
    line-height: 1.3;
    text-shadow: 0 0 30px rgba(255,107,0,0.6), 0 2px 4px rgba(0,0,0,0.8);
    margin-bottom: 0.2rem;
  }

  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.5rem auto 1rem;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border: 1px solid rgba(255,165,0,0.2);
    border-radius: 22px;
    overflow: hidden;
    margin-bottom: 1.2rem;
  }
  .tab {
    padding: 0.4rem 1.2rem;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: transparent;
    transition: all 0.2s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: rgba(255,107,0,0.15);
    color: var(--saffron);
  }

  /* ── JAP TAB ── */
  #tabJap { display: flex; flex-direction: column; align-items: center; width: 100%; }

  .counter-ring {
    position: relative;
    width: 200px; height: 200px;
    margin: 0 auto 1.2rem;
  }
  .counter-ring svg {
    position: absolute; top:0; left:0;
    width:100%; height:100%;
    transform: rotate(-90deg);
  }
  .ring-track { fill:none; stroke:rgba(255,255,255,0.05); stroke-width:6; }
  .ring-fill  { fill:none; stroke:url(#ringGrad); stroke-width:6; stroke-linecap:round;
                stroke-dasharray:0 628; transition:stroke-dasharray 0.4s ease; }
  .counter-inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.1rem;
  }
  .count-number {
    font-size: clamp(3.2rem,14vw,4.2rem);
    font-weight: 700; color: var(--cream);
    line-height: 1; letter-spacing: -0.02em;
    text-shadow: 0 0 20px var(--glow);
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .count-number.bump { transform: scale(1.18); }
  .count-label {
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 0.7rem; color: var(--muted); letter-spacing:0.12em;
  }

  .mala-row {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 5px;
    max-width: 340px; margin: 0 auto 0.4rem;
  }
  .bead {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,165,0,0.2);
    transition: background 0.25s, box-shadow 0.25s;
    flex-shrink:0;
  }
  .bead.lit { background:var(--gold); box-shadow:0 0 6px var(--gold); }
  .bead.sumeru { width:11px; height:11px; background:var(--saffron); box-shadow:0 0 10px var(--saffron); border-color:var(--saffron); }

  .mala-label {
    font-family:'Noto Sans Devanagari',sans-serif;
    font-size:0.68rem; color:var(--muted);
    text-align:center; margin-bottom:0.9rem;
  }

  .tap-btn {
    width:125px; height:125px; border-radius:50%;
    border:2px solid var(--saffron);
    background:radial-gradient(circle at 40% 35%, #3a0a0a, #1a0303);
    color:var(--saffron);
    font-family:'Noto Serif Devanagari',serif;
    font-size:1rem; font-weight:600;
    cursor:pointer; position:relative;
    box-shadow:0 0 30px rgba(139,0,0,0.5), inset 0 0 20px rgba(255,107,0,0.05);
    transition:box-shadow 0.15s, transform 0.1s;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:4px;
    -webkit-tap-highlight-color:transparent; outline:none;
    margin-bottom:1.2rem; line-height:1.3; text-align:center;
  }
  .tap-btn:active { transform:scale(0.93); box-shadow:0 0 50px rgba(255,107,0,0.5),inset 0 0 30px rgba(255,107,0,0.15); }
  .tap-btn .devi { font-size:1.5rem; }
  .tap-btn::after { content:''; position:absolute; inset:-4px; border-radius:50%; border:1px solid rgba(255,165,0,0.25); }

  .controls { display:flex; gap:0.8rem; align-items:center; margin-bottom:1rem; }
  .ctrl-btn {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,165,0,0.2);
    color:var(--muted);
    font-family:'Noto Sans Devanagari',sans-serif;
    font-size:0.73rem; padding:0.4rem 0.9rem;
    border-radius:20px; cursor:pointer;
    transition:all 0.2s;
    -webkit-tap-highlight-color:transparent; outline:none;
  }
  .ctrl-btn:hover { border-color:var(--gold); color:var(--gold); }
  .ctrl-btn.danger:hover { border-color:var(--crimson); color:#ff6666; }

  .stats { display:flex; gap:2rem; justify-content:center; margin-bottom:0.4rem; }
  .stat { text-align:center; }
  .stat-value { font-size:1.2rem; font-weight:600; color:var(--gold); }
  .stat-name { font-family:'Noto Sans Devanagari',sans-serif; font-size:0.62rem; color:var(--muted); letter-spacing:0.1em; margin-top:2px; }

  .hint { font-family:'Noto Sans Devanagari',sans-serif; font-size:0.6rem; color:rgba(122,92,92,0.45); margin-top:0.3rem; }

  /* ── HISTORY TAB ── */
  #tabHistory { display:none; flex-direction:column; width:100%; gap:0.7rem; }

  .hist-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:0.3rem;
  }
  .hist-title { font-size:0.85rem; color:var(--gold); }
  .export-btn {
    background:rgba(255,165,0,0.08);
    border:1px solid rgba(255,165,0,0.25);
    color:var(--gold); font-size:0.68rem;
    padding:0.3rem 0.7rem; border-radius:14px;
    cursor:pointer; font-family:'Noto Sans Devanagari',sans-serif;
    -webkit-tap-highlight-color:transparent; outline:none;
    transition:all 0.2s;
  }
  .export-btn:hover { background:rgba(255,165,0,0.15); }

  .hist-list { display:flex; flex-direction:column; gap:0.5rem; max-height:55vh; overflow-y:auto; padding-right:4px; }
  .hist-list::-webkit-scrollbar { width:3px; }
  .hist-list::-webkit-scrollbar-track { background:transparent; }
  .hist-list::-webkit-scrollbar-thumb { background:rgba(255,165,0,0.2); border-radius:3px; }

  .hist-entry {
    background:var(--panel);
    border:1px solid rgba(255,165,0,0.1);
    border-radius:10px;
    padding:0.65rem 0.9rem;
    display:flex; justify-content:space-between; align-items:center;
  }
  .hist-date { font-family:'Noto Sans Devanagari',sans-serif; font-size:0.75rem; color:var(--muted); }
  .hist-nums { display:flex; gap:1.2rem; }
  .hist-num { text-align:right; }
  .hist-val { font-size:1rem; font-weight:600; color:var(--cream); }
  .hist-lbl { font-family:'Noto Sans Devanagari',sans-serif; font-size:0.58rem; color:var(--muted); }

  .hist-empty { text-align:center; color:var(--muted); font-size:0.8rem; padding:2rem 0; }

  /* Streak banner */
  .streak-bar {
    background:rgba(255,107,0,0.08);
    border:1px solid rgba(255,107,0,0.2);
    border-radius:10px;
    padding:0.6rem 1rem;
    display:flex; justify-content:space-around; align-items:center;
    margin-bottom:0.2rem;
  }
  .streak-item { text-align:center; }
  .streak-val { font-size:1.1rem; font-weight:700; color:var(--saffron); }
  .streak-lbl { font-family:'Noto Sans Devanagari',sans-serif; font-size:0.6rem; color:var(--muted); }

  /* Ripple */
  .ripple-host { position:fixed; inset:0; pointer-events:none; z-index:99; }
  .ripple {
    position:absolute; border-radius:50%;
    background:rgba(255,107,0,0.25);
    width:20px; height:20px;
    margin-left:-10px; margin-top:-10px;
    animation:rippleOut 0.6s ease-out forwards; pointer-events:none;
  }
  @keyframes rippleOut { to { transform:scale(18); opacity:0; } }

  /* Flash */
  .maala-complete {
    display:none; position:fixed; inset:0;
    background:rgba(255,107,0,0.12); z-index:50;
    align-items:center; justify-content:center;
    font-size:1.4rem; color:var(--gold);
    text-align:center; padding:2rem; pointer-events:none;
    animation:fadeFlash 1.8s ease forwards;
  }
  .maala-complete.show { display:flex; }
  @keyframes fadeFlash { 0%{opacity:0} 20%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div class="sparks" id="sparks"></div>
<div class="ripple-host" id="rippleHost"></div>

<div class="maala-complete" id="maalaFlash">
  🌸 एक माला पूरी हुई! 🌸<br>
  <span style="font-size:0.85rem;color:var(--cream);margin-top:0.5rem;display:block">जय काली माई की जय!</span>
</div>

<div class="wrapper">
  <div class="om">ॐ</div>
  <div class="mantra-title">जय काली माई</div>
  <div class="divider"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('jap',this)">जप</button>
    <button class="tab" onclick="switchTab('history',this)">इतिहास</button>
  </div>

  <!-- JAP TAB -->
  <div id="tabJap">
    <div class="counter-ring">
      <svg viewBox="0 0 200 200">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF6B00"/>
            <stop offset="100%" stop-color="#D4A017"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="100" cy="100" r="88"/>
        <circle class="ring-fill"  cx="100" cy="100" r="88" id="ringFill"/>
      </svg>
      <div class="counter-inner">
        <div class="count-number" id="countNum">0</div>
        <div class="count-label">जप संख्या</div>
      </div>
    </div>

    <div class="mala-row" id="malaRow"></div>
    <div class="mala-label" id="malaLabel">माला: 0 / 108</div>

    <button class="tap-btn" id="tapBtn" onclick="addJap(event)">
      <span class="devi">🪔</span>
      <span>जप करें</span>
    </button>

    

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="maalasCount">0</div>
        <div class="stat-name">माला</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-name">आज</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="grandTotal">0</div>
        <div class="stat-name">सर्वकाल</div>
      </div>
    </div>
    <div class="hint">स्पेसबार या Enter से भी जप करें</div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tabHistory">
    <div class="streak-bar" id="streakBar">
      <div class="streak-item"><div class="streak-val" id="streakDays">0</div><div class="streak-lbl">दिन की लकीर</div></div>
      <div class="streak-item"><div class="streak-val" id="bestDay">0</div><div class="streak-lbl">सर्वश्रेष्ठ दिन</div></div>
      <div class="streak-item"><div class="streak-val" id="lifetimeTotal">0</div><div class="streak-lbl">कुल जप</div></div>
    </div>
    <div class="hist-header">
      <span class="hist-title">दैनिक इतिहास</span>
      <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
    </div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>

<script>
const MALA = 108;
const KEY  = 'kaliJap2';

// ── State ──
let state = {
  count: 0,      // current bead position
  malas: 0,      // malas completed today
  todayJap: 0,   // jap today
  history: {},   // { "YYYY-MM-DD": { jap, malas } }
  grandTotal: 0
};
let undoStack = [];

function today() {
  return new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
}

// ── Persistence ──
function load() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (s) state = s;
    // Ensure today entry exists
    if (!state.history) state.history = {};
    const t = today();
    if (!state.history[t]) {
      state.history[t] = { jap: 0, malas: 0 };
      state.count = 0; state.malas = 0; state.todayJap = 0;
    }
  } catch(e) {}
}

function save() {
  state.history[today()] = { jap: state.todayJap, malas: state.malas };
  localStorage.setItem(KEY, JSON.stringify(state));
}

// ── Actions ──
function addJap(e) {
  if (e) spawnRipple(e);
  undoStack.push(JSON.parse(JSON.stringify(state)));
  if (undoStack.length > 50) undoStack.shift();

  state.todayJap++;
  state.grandTotal++;
  state.count++;
  if (state.count >= MALA) {
    state.count = 0;
    state.malas++;
    showMaalaComplete();
  }
  save(); render(); bumpNumber();
}

function undoLast() {
  if (!undoStack.length) return;
  state = undoStack.pop();
  save(); render();
}

function resetToday() {
  if (!confirm('आज के जप रीसेट करें?')) return;
  state.count = 0; state.malas = 0; state.todayJap = 0;
  state.grandTotal = calcGrandTotal();
  undoStack = [];
  save(); render();
}

function resetAll() {
  if (!confirm('सभी जप और इतिहास मिटाएँ?')) return;
  state = { count:0, malas:0, todayJap:0, history:{}, grandTotal:0 };
  state.history[today()] = { jap:0, malas:0 };
  undoStack = [];
  save(); render();
}

function calcGrandTotal() {
  return Object.values(state.history).reduce((s, d) => s + (d.jap || 0), 0);
}

// ── Render ──
function render() {
  // Jap tab
  document.getElementById('countNum').textContent    = state.count;
  document.getElementById('totalCount').textContent  = state.todayJap;
  document.getElementById('maalasCount').textContent = state.malas;
  document.getElementById('grandTotal').textContent  = state.grandTotal;
  document.getElementById('malaLabel').textContent   = `माला: ${state.count} / ${MALA}`;

  const circ = 2 * Math.PI * 88;
  document.getElementById('ringFill').style.strokeDasharray =
    `${(state.count / MALA) * circ} ${circ}`;

  document.querySelectorAll('.bead').forEach((b, i) => {
    b.classList.toggle('lit', i < state.count);
  });

  // History tab
  renderHistory();
}

function renderHistory() {
  const entries = Object.entries(state.history)
    .sort((a,b) => b[0].localeCompare(a[0]));

  // Streak
  let streak = 0, best = 0, lt = 0;
  const sorted = [...entries].sort((a,b) => a[0].localeCompare(b[0]));
  let prevDate = null, cur = 0;
  sorted.forEach(([d, v]) => {
    lt += (v.jap || 0);
    if (v.jap > 0) {
      if (prevDate) {
        const diff = (new Date(d) - new Date(prevDate)) / 86400000;
        cur = (diff === 1) ? cur + 1 : 1;
      } else { cur = 1; }
      if (cur > best) best = cur;
      prevDate = d;
    } else { cur = 0; prevDate = d; }
  });
  // streak = consecutive days ending today
  streak = 0;
  let check = new Date();
  for (let i = sorted.length - 1; i >= 0; i--) {
    const d = sorted[i][0];
    const cd = check.toLocaleDateString('sv-SE');
    if (d === cd && sorted[i][1].jap > 0) {
      streak++;
      check.setDate(check.getDate() - 1);
    } else if (d === cd) { break; }
    else break;
  }

  document.getElementById('streakDays').textContent  = streak;
  document.getElementById('bestDay').textContent     = best;
  document.getElementById('lifetimeTotal').textContent = lt;

  const list = document.getElementById('histList');
  if (entries.length === 0) {
    list.innerHTML = '<div class="hist-empty">अभी कोई इतिहास नहीं</div>';
    return;
  }

  list.innerHTML = entries.map(([d, v]) => {
    const dt = new Date(d);
    const label = dt.toLocaleDateString('hi-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    return `
    <div class="hist-entry">
      <div class="hist-date">${label}</div>
      <div class="hist-nums">
        <div class="hist-num">
          <div class="hist-val">${v.jap || 0}</div>
          <div class="hist-lbl">जप</div>
        </div>
        <div class="hist-num">
          <div class="hist-val">${v.malas || 0}</div>
          <div class="hist-lbl">माला</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Tabs ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabJap').style.display     = (name === 'jap')     ? 'flex' : 'none';
  document.getElementById('tabHistory').style.display = (name === 'history') ? 'flex' : 'none';
  if (name === 'history') renderHistory();
}

// ── Export CSV ──
function exportCSV() {
  const rows = [['तारीख','जप','माला']];
  Object.entries(state.history)
    .sort((a,b) => a[0].localeCompare(b[0]))
    .forEach(([d,v]) => rows.push([d, v.jap||0, v.malas||0]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a   = document.createElement('a');
  a.href    = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download= 'kali_jap_history.csv';
  a.click();
}

// ── Mala beads ──
(function buildMala() {
  const row = document.getElementById('malaRow');
  for (let i = 0; i < MALA; i++) {
    const b = document.createElement('div');
    b.className = 'bead' + (i === 0 ? ' sumeru' : '');
    row.appendChild(b);
  }
})();

// ── Animations ──
function bumpNumber() {
  const el = document.getElementById('countNum');
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}

function showMaalaComplete() {
  const el = document.getElementById('maalaFlash');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1900);
}

function spawnRipple(e) {
  const host = document.getElementById('rippleHost');
  const r    = document.createElement('div');
  r.className = 'ripple';
  const rect = e.currentTarget.getBoundingClientRect();
  r.style.left = (rect.left + rect.width/2) + 'px';
  r.style.top  = (rect.top  + rect.height/2) + 'px';
  host.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault(); addJap(null);
  }
});

(function buildSparks() {
  const host = document.getElementById('sparks');
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left   = Math.random() * 100 + '%';
    s.style.bottom = '-5px';
    s.style.setProperty('--dur',   (4 + Math.random() * 6) + 's');
    s.style.setProperty('--delay', (Math.random() * 8) + 's');
    s.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    s.style.width = s.style.height = (2 + Math.random() * 4) + 'px';
    if (Math.random() > 0.5) s.style.background = 'var(--saffron)';
    host.appendChild(s);
  }
})();

// ── Init ──
load(); render();
</script>
</body>
</html>
